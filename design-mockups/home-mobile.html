<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <title>UroMed Clinic – Mobile Mockup (iPhone 15)</title>
  <link rel="stylesheet" href="../src/index-flagship.css" />
  <link rel="stylesheet" href="../src/styles/spacing.css" />
  <style>
    body {font-family: var(--type-body-font-family, system-ui), sans-serif; background: var(--color-background); color: var(--color-text-primary);}
    .mockup-container {padding: var(--spacing-lg-390);}
    .card-grid {display: grid; grid-template-columns: 1fr; gap: var(--spacing-lg-390); margin-top: var(--spacing-lg-390);}
    .card {background: var(--color-surface); border: 1px solid var(--color-muted); border-radius: 8px; padding: var(--spacing-md-390); box-shadow: var(--elev-2);
      display: flex; flex-direction: column; justify-content: space-between;}
    .card h3 {margin: 0 0 var(--spacing-sm-390); font-size: 1.1rem;}
    .card p {margin: 0; flex-grow: 1;}
    .card button {margin-top: var(--spacing-sm-390); padding: var(--spacing-xs-390) var(--spacing-sm-390); background: var(--color-primary); color: var(--color-surface); border: none; border-radius: 4px; cursor: pointer;}
    .navbar {display: flex; align-items: center; justify-content: space-between; padding: var(--spacing-md-390) var(--spacing-sm-390); background: var(--color-surface); box-shadow: var(--elev-1);}
    .navbar h1 {margin: 0; font-size: 1.3rem;}
    .navbar nav a {margin-right: var(--spacing-sm-390); font-size: 0.9rem; color: var(--color-text-primary); text-decoration: none;}
  </style>
</head>
<body>
  <header class="navbar">
    <h1>UroMed Clinic</h1>
    <nav>
      <a href="#">Главная</a>
      <a href="#">База</a>
      <a href="#">О нас</a>
    </nav>
  </header>
  <main class="mockup-container">
    <h2>Библиотека нозологий</h2>
    <div class="card-grid">
      <div class="card">
        <h3>Гиперплазия простаты</h3>
        <p>Краткое описание состояния, симптомы, лечение.</p>
        <button>Подробнее</button>
      </div>
      <div class="card">
        <h3>Инфекция мочевых путей</h3>
        <p>Краткое описание состояния, симптомы, лечение.</p>
        <button>Подробнее</button>
      </div>
      <div class="card">
        <h3>Камни в почках</h3>
        <p>Информация о диагностике, профилактике и терапии.</p>
        <button>Подробнее</button>
      </div>
    </div>
  </main>
</body>
</html>
